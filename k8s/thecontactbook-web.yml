apiVersion: apps/v1
kind: Deployment
metadata:
  name: thcontactbook-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thcontactbook-web
  template:
    metadata:
      labels:
        app: thcontactbook-web
    spec:
      containers:
        - name: web
          # Automatically pulls your freshly built GitHub Actions image
          image: kundanvrs/thcontactbook-web:latest
          imagePullPolicy: IfNotPresent  # <-- Add/change this line
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:secretpass@db:5432/contact_db
---
apiVersion: v1
kind: Service
metadata:
  name: thcontactbook-service
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
  selector:
    app: thcontactbook-web